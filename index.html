<!DOCTYPE html>
<html>
<head>
  <title>Music Assets Tree</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/index.css">
</head>
<body>
  <!-- Header Band -->
  <div style="width:100vw;background:linear-gradient(90deg,#1976d2 0%,#42a5f5 100%);color:#fff;padding:24px 0 16px 0;box-shadow:0 2px 8px rgba(33,150,243,0.08);margin-bottom:24px;">
    <h3 style="margin:0;text-align:center;font-weight:600;letter-spacing:1px;text-shadow:0 2px 8px rgba(33,150,243,0.12);">Music Library</h3>
  </div>
  <div class="container" style="max-width:1200px;display:flex;gap:32px;align-items:flex-start;">
    <div style="flex:2;">
      <div id="treeRoot"></div>
    </div>
    <div id="sidePane" style="flex:1;min-width:70%;max-width:80%;background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(33,150,243,0.08);padding:24px 16px;margin-top:48px;display:none;">
      <h5 id="sidePaneTitle" style="color:#1976d2;"></h5>
      <video id="sidePaneVideo" width="100%" height="260" style="border-radius:12px;outline:none;" controls></video>
    </div>
  </div>
  <script src="assets/index.js"></script>
</body>
</html>
