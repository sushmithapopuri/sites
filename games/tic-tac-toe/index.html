<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>Tic Tac Toe</h1>
            <div class="mode-selector">
                <button id="btn-1p" class="active">1 Player</button>
                <button id="btn-2p">2 Players</button>
            </div>
            <div class="status" id="status">Player X's turn</div>
        </header>

        <main>
            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
            <div class="controls">
                <button id="reset-btn">Reset Game</button>
            </div>
        </main>

        <div class="scores">
            <div class="score-card">
                <span class="player-name">Player X</span>
                <span class="score-value" id="score-x">0</span>
            </div>
            <div class="score-card">
                <span class="player-name">Ties</span>
                <span class="score-value" id="score-ties">0</span>
            </div>
            <div class="score-card">
                <span class="player-name" id="player-o-name">AI (O)</span>
                <span class="score-value" id="score-o">0</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
